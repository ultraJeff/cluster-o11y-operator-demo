# PrometheusRule for HotROD demo app
# These alerts are picked up by the MonitoringStack's Prometheus and routed
# through its Alertmanager. They will appear in Observe > Alerting > Incidents.
#
# The "monitoring: demo" label connects this to the MonitoringStack's resourceSelector.
# Uses monitoring.rhobs API group (required for COO MonitoringStack).
apiVersion: monitoring.rhobs/v1
kind: PrometheusRule
metadata:
  name: hotrod-alerts
  namespace: hotrod-demo
  labels:
    monitoring: demo
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  groups:
    - name: hotrod.rules
      rules:
        - alert: HotRODDown
          expr: up{job="hotrod"} == 0
          for: 1m
          labels:
            severity: critical
            app: hotrod
          annotations:
            summary: "HotROD application is down"
            description: "The HotROD application in namespace {{ $labels.namespace }} has been unreachable for more than 1 minute."

        - alert: HotRODHighLatency
          expr: histogram_quantile(0.99, rate(hotrod_request_latency_bucket{job="hotrod"}[5m])) > 2
          for: 2m
          labels:
            severity: warning
            app: hotrod
          annotations:
            summary: "HotROD high request latency"
            description: "HotROD p99 latency is above 2 seconds (current: {{ $value | humanizeDuration }})."

        - alert: HotRODHighErrorRate
          expr: |
            (
              sum(rate(hotrod_http_requests_total{job="hotrod", status=~"5.."}[5m]))
              /
              sum(rate(hotrod_http_requests_total{job="hotrod"}[5m]))
            ) > 0.05
          for: 2m
          labels:
            severity: warning
            app: hotrod
          annotations:
            summary: "HotROD high error rate"
            description: "More than 5% of HotROD requests are returning 5xx errors (current: {{ $value | humanizePercentage }})."
