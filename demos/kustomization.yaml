apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: observability-demos
  annotations:
    config.openshift.io/description: "Demo workloads for the observability stack"

resources:
# Shared demo monitoring infrastructure (COO MonitoringStack)
- monitoringstack.yaml

# HotROD demo (app + ServiceMonitor + alerts)
- hotrod/

# Synthetic trace generator
- sample-tracing/

# NOTE: The following demos include source code and require OpenShift binary
# builds, so they are deployed separately (see each demo's README/deploy.sh):
#   - dotnet-tracing/       (oc apply -f + oc start-build)
#   - quarkus-autoinstrumentation/  (./deploy.sh all)
