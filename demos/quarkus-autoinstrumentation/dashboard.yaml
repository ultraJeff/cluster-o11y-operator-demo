# Grafana instance with a pre-loaded dashboard for the Quarkus demo.
# Queries Thanos Querier for Prometheus metrics and the TempoStack
# gateway for distributed traces. Anonymous read-only access is
# enabled so developers can view dashboards without credentials.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: quarkus-otel-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana-tempo-traces-reader
rules:
  - apiGroups: ["tempo.grafana.com"]
    resources: ["application"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-quarkus-otel-demo-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: quarkus-otel-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-quarkus-otel-demo-tempo-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana-tempo-traces-reader
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: quarkus-otel-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: quarkus-otel-demo
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
        isDefault: true
        jsonData:
          httpHeaderName1: Authorization
          timeInterval: 30s
          tlsSkipVerify: true
        secureJsonData:
          httpHeaderValue1: "Bearer ${SA_TOKEN}"
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: https://tempo-tracing-gateway.observability.svc.cluster.local:8080/api/traces/v1/application/tempo
        jsonData:
          httpHeaderName1: Authorization
          tlsSkipVerify: true
          tracesToMetrics:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
        secureJsonData:
          httpHeaderValue1: "Bearer ${SA_TOKEN}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: quarkus-otel-demo
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ""
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-quarkus
  namespace: quarkus-otel-demo
data:
  quarkus-otel-demo.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "title": "CPU Usage (cores)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (container) (rate(container_cpu_usage_seconds_total{namespace=\"quarkus-otel-demo\",container=~\"store-frontend|order-service|catalog-service\",container!=\"POD\"}[5m]))",
            "legendFormat": "{{container}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 3,
              "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] }
            },
            "overrides": []
          },
          "options": { "graphMode": "area", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "title": "Memory (working set)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"quarkus-otel-demo\",container=~\"store-frontend|order-service|catalog-service\",container!=\"POD\"})",
            "legendFormat": "{{container}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": { "mode": "absolute", "steps": [{"color": "green", "value": null}] }
            },
            "overrides": []
          },
          "options": { "graphMode": "area", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "title": "Pod Restarts",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (container) (kube_pod_container_status_restarts_total{namespace=\"quarkus-otel-demo\",container=~\"store-frontend|order-service|catalog-service\"})",
            "legendFormat": "{{container}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 1},
                  {"color": "red", "value": 5}
                ]
              }
            },
            "overrides": []
          },
          "options": { "graphMode": "none", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "title": "Ready Pods",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (deployment) (kube_deployment_status_replicas_ready{namespace=\"quarkus-otel-demo\",deployment=~\"store-frontend|order-service|catalog-service\"})",
            "legendFormat": "{{deployment}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "decimals": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              }
            },
            "overrides": []
          },
          "options": { "graphMode": "none", "textMode": "auto", "reduceOptions": { "calcs": ["lastNotNull"] } }
        },
        {
          "title": "CPU Usage Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (container) (rate(container_cpu_usage_seconds_total{namespace=\"quarkus-otel-demo\",container=~\"store-frontend|order-service|catalog-service\",container!=\"POD\"}[5m]))",
            "legendFormat": "{{container}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2, "fillOpacity": 15, "showPoints": "never" }
            },
            "overrides": []
          }
        },
        {
          "title": "Memory Working Set Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (container) (container_memory_working_set_bytes{namespace=\"quarkus-otel-demo\",container=~\"store-frontend|order-service|catalog-service\",container!=\"POD\"})",
            "legendFormat": "{{container}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 2, "fillOpacity": 15, "showPoints": "never" }
            },
            "overrides": []
          }
        },
        {
          "title": "Network Receive Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (pod) (rate(container_network_receive_bytes_total{namespace=\"quarkus-otel-demo\"}[5m]))",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "lineWidth": 2, "fillOpacity": 15, "showPoints": "never" }
            },
            "overrides": []
          }
        },
        {
          "title": "Network Transmit Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{
            "expr": "sum by (pod) (rate(container_network_transmit_bytes_total{namespace=\"quarkus-otel-demo\"}[5m]))",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "lineWidth": 2, "fillOpacity": 15, "showPoints": "never" }
            },
            "overrides": []
          }
        },
        {
          "title": "Recent Traces",
          "description": "Latest traces from the Quarkus demo services. Click a Trace ID to open it in Explore.",
          "type": "table",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 21 },
          "datasource": { "type": "tempo", "uid": "tempo" },
          "targets": [{
            "queryType": "traceqlSearch",
            "limit": 20,
            "tableType": "traces",
            "filters": [
              { "id": "service-name", "tag": "service.name", "operator": "=~", "value": ["store-frontend", "order-service", "catalog-service"], "scope": "resource" }
            ]
          }],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "traceID" },
                "properties": [{
                  "id": "links",
                  "value": [{
                    "title": "View trace",
                    "url": "/explore?left={\"datasource\":\"tempo\",\"queries\":[{\"query\":\"${__value.raw}\",\"queryType\":\"traceql\"}]}",
                    "targetBlank": true
                  }]
                }]
              }
            ]
          },
          "options": { "showHeader": true, "cellHeight": "sm" }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["quarkus", "opentelemetry", "demo"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "title": "Quarkus Auto-Instrumentation Demo",
      "uid": "quarkus-otel-demo"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: quarkus-otel-demo
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: grafana
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: docker.io/grafana/grafana:11.6.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "demo"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Editor"
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: SA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-sa-token
                  key: token
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-quarkus
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: quarkus-otel-demo
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: grafana
  namespace: quarkus-otel-demo
spec:
  to:
    kind: Service
    name: grafana
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
