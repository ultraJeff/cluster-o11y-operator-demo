---
apiVersion: v1
kind: Namespace
metadata:
  name: quarkus-otel-demo
  labels:
    name: quarkus-otel-demo
---
# Instrumentation CR — the OpenTelemetry Operator injects the Java agent into
# any pod whose Deployment carries the inject-java annotation. The application
# code has zero OTel dependencies; all instrumentation is handled by the agent.
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: java-instrumentation
  namespace: quarkus-otel-demo
spec:
  exporter:
    endpoint: http://trace-filter-collector.quarkus-otel-demo.svc.cluster.local:4317
  env:
    - name: OTEL_SEMCONV_STABILITY_OPT_IN
      value: http
    - name: OTEL_METRICS_EXPORTER
      value: none
    - name: OTEL_LOGS_EXPORTER
      value: none
  propagators:
    - tracecontext
    - baggage
  sampler:
    type: parentbased_traceidratio
    argument: "1"
  java:
    resources:
      limits: {}
      requests: {}
---
# ── Catalog Service ──────────────────────────────────────────────────────────
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: catalog-service
  namespace: quarkus-otel-demo
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: catalog-service
  namespace: quarkus-otel-demo
spec:
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: catalog-service:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: quarkus-otel-demo
  labels:
    app: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
      annotations:
        instrumentation.opentelemetry.io/inject-java: "true"
    spec:
      containers:
      - name: catalog-service
        image: image-registry.openshift-image-registry.svc:5000/quarkus-otel-demo/catalog-service:latest
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /q/health/live
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: quarkus-otel-demo
  labels:
    app: catalog-service
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: catalog-service
  type: ClusterIP
---
