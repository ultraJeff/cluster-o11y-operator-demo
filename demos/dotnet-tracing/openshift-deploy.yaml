---
apiVersion: v1
kind: Namespace
metadata:
  name: dotnet-tracing-demo
  labels:
    name: dotnet-tracing-demo
---
# Inventory Service
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: inventory-service
  namespace: dotnet-tracing-demo
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: inventory-service
  namespace: dotnet-tracing-demo
spec:
  source:
    type: Binary
    binary: {}
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: inventory-service:latest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: dotnet-tracing-demo
  labels:
    app: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: image-registry.openshift-image-registry.svc:5000/dotnet-tracing-demo/inventory-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://tracing-collector.observability.svc:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
              - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: dotnet-tracing-demo
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: inventory-service
---
