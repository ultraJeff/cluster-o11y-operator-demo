---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend
  namespace: dotnet-tracing-demo
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: 8080
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
