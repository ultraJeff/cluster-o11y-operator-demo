# Sample application that generates traces for testing
# Sends traces to the OpenTelemetry Collector
apiVersion: v1
kind: Namespace
metadata:
  name: tracing-demo
  labels:
    name: tracing-demo
  annotations:
    argocd.argoproj.io/sync-wave: '2'
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-generator
  namespace: tracing-demo
  labels:
    app: trace-generator
  annotations:
    argocd.argoproj.io/sync-wave: '2'
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trace-generator
  template:
    metadata:
      labels:
        app: trace-generator
      annotations:
        argocd.argoproj.io/sync-wave: '2'
        argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    spec:
      containers:
      - name: trace-generator
        image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
        command: ["/telemetrygen"]
        args:
        - "traces"
        - "--otlp-endpoint"
        - "tracing-collector.observability.svc.cluster.local:4317"
        - "--otlp-insecure"
        - "--rate"
        - "1"
        - "--duration"
        - "inf"
        - "--service"
        - "demo-service"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
