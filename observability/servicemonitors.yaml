---
# ServiceMonitor for HotROD demo app
# The "monitoring: demo" label connects this to the MonitoringStack's resourceSelector
# HotROD (Go/Jaeger) exposes Prometheus metrics on its frontend port
apiVersion: monitoring.rhobs/v1
kind: ServiceMonitor
metadata:
  name: hotrod
  namespace: hotrod-demo
  labels:
    monitoring: demo
spec:
  selector:
    matchLabels:
      app: hotrod
  endpoints:
    - port: frontend
      path: /metrics
      interval: 30s
# NOTE: The .NET demo services (dotnet-tracing-demo) do not currently expose
# a /metrics endpoint. To add Prometheus metrics to the .NET apps, add the
# prometheus-net.AspNetCore NuGet package and call app.MapPrometheusScrapingEndpoint()
# in Program.cs, then create a ServiceMonitor similar to the one above.
