apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: observability
  annotations:
    config.openshift.io/description: "Cluster Observability Operator and UI Plugins"

resources:
# Operator subscriptions (install first — CRDs must exist before instances)
- operators/

# S3-compatible object storage for Loki and Tempo backends
- storage/

# LokiStack and log forwarding pipeline
- logging/

# TempoStack + OTel Collector (via ObservabilityInstaller)
- tracing/

# COO console UI plugins (require operator CRDs)
- ui-plugins/
