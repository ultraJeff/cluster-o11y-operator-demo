apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: observability
  annotations:
    config.openshift.io/description: "Cluster Observability Operator and UI Plugins"

resources:
# Operators
- loki-operator.yaml
- tempo-operator.yaml
- opentelemetry-operator.yaml
- cluster-observability-operator.yaml
- cluster-logging-operator.yaml

# Object storage for Loki and Tempo
- minio.yaml

# LokiStack for logging
- lokistack.yaml

# Log collection and forwarding
- clusterlogforwarder.yaml

# ObservabilityInstaller - creates TempoStack and OTel Collector automatically
# This is a Technology Preview feature that simplifies distributed tracing setup
- observability-installer.yaml

# MonitoringStack - dedicated Prometheus for demo workloads (COO feature)
- monitoringstack.yaml

# ServiceMonitors for demo apps (scraped by the MonitoringStack)
- servicemonitors.yaml

# PrometheusRules for demo app alerts (routed through MonitoringStack Alertmanager)
- prometheusrules.yaml

# Sample app to generate traces (for demo/testing)
- sample-tracing-app.yaml

# UI Plugins - Applied after operator is ready
# These require the COO CRDs to be available
- ui-plugin-logging.yaml
- ui-plugin-monitoring.yaml
- ui-plugin-distributed-tracing.yaml
- ui-plugin-troubleshooting-panel.yaml
- ui-plugin-dashboards.yaml
