---
# Logging UI Plugin for Cluster Observability Operator
# Surfaces logging data in the OpenShift web console at Observe → Logs
# Requires a LokiStack instance and ClusterLogForwarder to be deployed
apiVersion: observability.openshift.io/v1alpha1
kind: UIPlugin
metadata:
  name: logging
spec:
  type: Logging
  logging:
    lokiStack:
      name: logging-loki
      namespace: openshift-logging
    logsLimit: 1000
    timeout: 30s
