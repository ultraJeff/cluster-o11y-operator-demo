---
# ClusterRole to read traces from the application tenant
# This grants access to view traces in the COO Traces UI
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-reader
rules:
- apiGroups:
  - tempo.grafana.com
  resources:
  - application   # tenant name
  resourceNames:
  - traces
  verbs:
  - get
  - list
---
